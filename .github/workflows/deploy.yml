name: CI and Deploy

on:
  push:
    branches:
      - "**"
  pull_request:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PHP_VERSION: "8.3"
  NODE_VERSION: "20"

jobs:
  validate:
    name: Validate
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none
          extensions: mbstring, intl, pdo_mysql, zip
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install Composer dependencies
        working-directory: backend
        run: |
          composer install \
            --prefer-dist \
            --no-interaction \
            --no-progress \
            --no-scripts

      # Uncomment jika project membutuhkan .env saat testing
      #
      - name: Prepare Laravel environment
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm packages
        working-directory: frontend
        run: npm ci

      - name: Run Laravel Pint
        working-directory: backend
        run: vendor/bin/pint --test

#      - name: Run PHPStan / Larastan
#        working-directory: backend
#        run: |
#          vendor/bin/phpstan analyse \
#            --configuration=phpstan.neon \
#            --no-progress \
#            --ansi

      - name: Run Unit Tests
        working-directory: backend
        run: php artisan test

      - name: Dependency Scanning
        shell: bash
        run: |
          cd backend
          composer audit --no-interaction

          cd ../frontend
          npm audit --audit-level=high

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy:
    name: Build and Deploy
    runs-on: self-hosted
    timeout-minutes: 30
    needs: validate
    env:
      DOCKER_REPOSITORY: ${{ secrets.DOCKER_USERNAME }}

    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: |
          docker build \
            -t ${{ env.DOCKER_REPOSITORY }}/laravel-backend-apps:${{ github.sha }} \
            -t ${{ env.DOCKER_REPOSITORY }}/laravel-backend-apps:latest \
            ./backend

      - name: Build frontend image
        run: |
          docker build \
            -t ${{ env.DOCKER_REPOSITORY }}/laravel-frontend-apps:${{ github.sha }} \
            -t ${{ env.DOCKER_REPOSITORY }}/laravel-frontend-apps:latest \
            ./frontend

      - name: Push backend image
        run: |
          docker push ${{ env.DOCKER_REPOSITORY }}/backend:${{ github.sha }}
          docker push ${{ env.DOCKER_REPOSITORY }}/backend:latest

      - name: Push frontend image
        run: |
          docker push ${{ env.DOCKER_REPOSITORY }}/frontend:${{ github.sha }}
          docker push ${{ env.DOCKER_REPOSITORY }}/frontend:latest

      - name: Pull newest images
        run: docker compose pull --quiet

      - name: Restart Docker Compose
        run: docker compose up -d --remove-orphans --force-recreate

      - name: Remove unused Docker resources
        run: |
          docker image prune -f
          docker builder prune -f

      - name: Verify deployment
        shell: bash
        run: |
          docker compose ps

          curl -fsS http://127.0.0.1/healthz

      - name: Show logs if deployment failed
        if: failure()
        run: docker compose logs --tail=100