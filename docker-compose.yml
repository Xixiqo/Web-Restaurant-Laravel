services:
  backend:
    image: ${DOCKER_REPOSITORY}/backend:latest
    pull_policy: always

    volumes:
      - ./backend/.env:/var/www/html/.env:ro
      - backend-storage:/var/www/html/storage
      - backend-cache:/var/www/html/bootstrap/cache

    expose:
      - "9000"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    networks:
      - app-network

  frontend:
    image: ${DOCKER_REPOSITORY}/frontend:latest
    pull_policy: always

    expose:
      - "8080"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080"]
      interval: 30s
      timeout: 5s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    networks:
      - app-network

  nginx:
    image: nginxinc/nginx-unprivileged:1.27-alpine

    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

    ports:
      - "${APP_PORT:-80}:8080"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-cache:/var/cache/nginx

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    networks:
      - app-network

volumes:
  backend-storage:
  backend-cache:
  nginx-cache:

networks:
  app-network:
    driver: bridge